<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Game Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --card: #201e1a;
    --border: #2e2b24;
    --accent: #d4a853;
    --text: #e8e2d5;
    --muted: #8a8070;
    --sidebar: 280px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .sidebar-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 11px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0 20px;
  }
  .sidebar-scroll::-webkit-scrollbar { width: 4px; }
  .sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .sec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 16px 5px;
  }
  .filter-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    width: calc(100% - 8px);
    margin: 1px 4px;
    padding: 6px 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    text-align: left;
    border-radius: 5px;
    transition: background .15s, color .15s;
  }
  .filter-btn:hover { background: var(--card); }
  .filter-btn.active { background: rgba(212,168,83,.13); color: var(--accent); }
  .fdot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .d-all   { background: #d4a853; }
  .d-board { background: #7ab3c4; }
  .d-kids  { background: #8fb87a; }
  .d-puzzle{ background: #c47ab3; }
  .d-rpg   { background: #c4a07a; }
  .cbadge {
    margin-left: auto;
    font-size: 10px;
    color: var(--muted);
    background: var(--bg);
    border-radius: 10px;
    padding: 1px 6px;
  }
  .game-link {
    display: block;
    width: 100%;
    padding: 4px 16px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .15s;
  }
  .game-link:hover { color: var(--text); }
  .game-link.cur { color: var(--accent); font-weight: 500; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .topbar {
    padding: 13px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .gcounter { font-size: 12px; color: var(--muted); }
  .gcounter b { color: var(--accent); }
  .nav-row { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; transition: all .15s; user-select: none;
  }
  .nav-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .pos-label { font-size: 12px; color: var(--muted); min-width: 60px; text-align: center; }

  /* ── VIEWPORT ── */
  .viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .track {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 32px;
    will-change: transform;
  }
  .slide.s-current { transform: translateX(0); }
  .slide.s-out-left  { transform: translateX(-100%); }
  .slide.s-out-right { transform: translateX(100%); }
  .slide.s-animating { transition: transform .38s cubic-bezier(.25,.46,.45,.94); }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 820px;
    width: 100%;
    height: 100%;
    max-height: 100%;
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  /* Left image column */
  .card-img-col {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .game-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    background: #161410;
    padding: 16px;
    flex-shrink: 0;
  }
  .img-placeholder {
    width: 100%;
    aspect-ratio: 1/1;
    background: #161410;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
    flex-shrink: 0;
  }
  .img-loading {
    position: absolute;
    top: 8px; right: 8px;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .img-loading.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-img-meta {
    padding: 16px;
    flex: 1;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }
  .card-img-meta::-webkit-scrollbar { width: 3px; }
  .card-img-meta::-webkit-scrollbar-thumb { background: var(--border); }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; }
  .stat-info { flex: 1; }
  .stat-val { font-size: 13px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* Right info column */
  .card-info {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .card-head {
    padding: 24px 28px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .card-cat {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .16em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .cc-board { color: #7ab3c4; }
  .cc-kids  { color: #8fb87a; }
  .cc-puzzle{ color: #c47ab3; }
  .cc-rpg   { color: #c4a07a; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #8fb87a;
    display: inline-block;
    margin-left: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.4; transform:scale(.7); }
  }
  .card-desc-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 22px 28px 24px;
  }
  .card-desc-wrap::-webkit-scrollbar { width: 4px; }
  .card-desc-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .card-desc {
    font-size: 13.5px;
    line-height: 1.78;
    color: #a09080;
    white-space: pre-wrap;
  }
  .desc-loading {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px;
  }
  .mini-spin {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* bottom dots */
  .bottom-bar {
    padding: 10px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pdot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border); flex-shrink: 0; transition: all .2s;
  }
  .pdot.on { background: var(--accent); width: 16px; border-radius: 3px; }

  /* Mobile-only "List" toggle button */
  .list-toggle-btn {
    display: none;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    align-items: center;
    gap: 6px;
  }
  .list-toggle-btn:active { background: var(--bg); }

  @media (max-width: 700px) {
    /* Sidebar becomes a full-screen overlay, hidden by default (slides in from left) */
    .sidebar {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: 100%;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform .28s cubic-bezier(.25,.46,.45,.94);
      display: flex;
    }
    body.sidebar-open .sidebar { transform: translateX(0); }
    body.sidebar-open .main { visibility: hidden; }

    /* List toggle button visible only on mobile */
    .list-toggle-btn { display: inline-flex; }

    /* Topbar adjustments */
    .topbar { gap: 8px; }
    .gcounter { font-size: 11px; }

    /* Card layout: stack vertically; photo + header auto, description fills the rest */
    .card {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
    }
    .card-img-col {
      border-right: none;
      border-bottom: 1px solid var(--border);
      flex-direction: column;
      flex: 0 0 auto;
    }
    /* Hide the desktop stats column on mobile (it's the side stats list) */
    .card-img-meta { display: none; }
    /* Mobile image: shorter, cover the available width */
    .game-img, .img-placeholder {
      aspect-ratio: 16/9;
      padding: 12px;
      object-fit: contain;
    }
    .img-placeholder { font-size: 44px; }

    /* Title block tighter on mobile */
    .card-head { padding: 14px 18px 10px; }
    .card-cat { font-size: 8.5px; margin-bottom: 6px; }
    .card-title { font-size: 22px; }

    /* Mobile-only inline stats row (Players | Age | Time) */
    .mobile-stats {
      display: flex;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .mobile-stats .stat-row {
      flex: 1;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      padding: 0;
      border-bottom: none;
      min-width: 0;
    }
    .mobile-stats .stat-icon {
      font-size: 14px;
      width: auto;
      text-align: left;
      margin-bottom: 2px;
    }
    .mobile-stats .stat-val {
      font-size: 13px;
      line-height: 1.2;
      word-break: break-word;
    }
    .mobile-stats .stat-lbl {
      font-size: 9px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .card-desc-wrap { padding: 16px 18px 18px; }
    .card-desc { font-size: 13px; }
  }
  /* Desktop hides the mobile-stats row */
  @media (min-width: 701px) {
    .mobile-stats { display: none; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">🎲 Game Library</div>
    <div class="sidebar-sub">Browse the collection</div>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Search games…" id="searchInput">
  </div>
  <div class="sidebar-scroll" id="sidebarScroll"></div>
</aside>

<main class="main">
  <div class="topbar">
    <button class="list-toggle-btn" id="listToggleBtn" onclick="toggleSidebar()" aria-label="Show list">☰ List</button>
    <div class="gcounter">Showing <b id="gcount">0</b> games</div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="go(-1)">&#8592;</button>
      <span class="pos-label" id="posLabel">1 / 0</span>
      <button class="nav-btn" id="nextBtn" onclick="go(1)">&#8594;</button>
    </div>
  </div>

  <div class="viewport" id="viewport">
    <div class="track" id="track"></div>
  </div>

  <div class="bottom-bar" id="bottomBar"></div>
</main>

<script>
let GAMES = []; // populated from menu_export.json on init
// Map category → CSS class suffix
// Category lookup uses normalized (Title Case) keys
const CAT_CLS = {
  "Board Game": "board",
  "For The Youngest": "kids",
  "Puzzle": "puzzle",
  "Roleplaying Game": "rpg"
};
const CAT_EMOJI = {
  "Board Game": "🎯",
  "For The Youngest": "🧸",
  "Puzzle": "🧩",
  "Roleplaying Game": "🐉"
};
// Normalize UPPERCASE category strings from the JSON to Title Case
function normalizeCategory(s) {
  if (!s) return "Board Game";
  return String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}
// Image-load fallback when a remote image fails (Drive throttle, network, CORS, etc.)
// Replaces the broken <img> with a centered 🎲 placeholder.
function imgFallback(imgEl) {
  const wrap = imgEl.parentElement;
  if (!wrap) return;
  wrap.innerHTML = '<div class="img-placeholder"><span>🎲</span></div>';
}

// Convert Google Drive "view" URL to a directly embeddable image URL
function driveUrlToImg(url) {
  if (!url) return null;
  const m = String(url).match(/\/file\/d\/([^/?#]+)/);
  return m ? `https://lh3.googleusercontent.com/d/${m[1]}` : url;
}

let filtered = [...GAMES];
let cur = 0;
let activeCategory = "All";
let searchTerm = "";



// ── VIRTUALIZED SLIDES ──
// Only 1-2 slides exist in the DOM at a time. Memory stays bounded regardless
// of library size. Each render uses a fresh DOM node, replacing the previous one.

function buildSlideHTML(g, i) {
  const cc = CAT_CLS[g.category] || "board";
  const em = CAT_EMOJI[g.category] || "🎲";
  return `<div class="card">
    <div class="card-img-col">
      <div class="img-placeholder" data-img-wrap="${i}"><span>🎲</span></div>
      <div class="card-img-meta">
        <div class="stat-row">
          <div class="stat-icon">👥</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.players || "—")}</div>
            <div class="stat-lbl">Players</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon">🎂</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.age || "—")}</div>
            <div class="stat-lbl">Recommended Age</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon">⏱</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.playtime || "—")}</div>
            <div class="stat-lbl">Play Time</div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-info">
      <div class="card-head">
        <div class="card-cat cc-${cc}">${em} ${escHtml(g.category)}</div>
        <div class="card-title">${escHtml(g.name)}</div>
      </div>
      <div class="mobile-stats">
        <div class="stat-row">
          <div class="stat-icon">👥</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.players || "—")}</div>
            <div class="stat-lbl">Players</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon">🎂</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.age || "—")}</div>
            <div class="stat-lbl">Age</div>
          </div>
        </div>
        <div class="stat-row">
          <div class="stat-icon">⏱</div>
          <div class="stat-info">
            <div class="stat-val">${escHtml(g.playtime || "—")}</div>
            <div class="stat-lbl">Time</div>
          </div>
        </div>
      </div>
      <div class="card-desc-wrap">
        <div class="card-desc">${escHtml(g.description || "No description available.")}</div>
      </div>
    </div>
  </div>`;
}

function makeSlide(idx, posClass) {
  const g = filtered[idx];
  if (!g) return null;
  const slide = document.createElement("div");
  slide.className = "slide " + posClass;
  slide.dataset.idx = idx;
  slide.innerHTML = buildSlideHTML(g, idx);
  // Set image (if any) immediately — it's just one <img>, not a perf concern
  const wrap = slide.querySelector("[data-img-wrap]");
  const imgSrc = driveUrlToImg(g.imageUrl);
  if (wrap && imgSrc) {
    wrap.innerHTML = `<img class="game-img" src="${imgSrc}" alt="${escHtml(g.name)}" referrerpolicy="no-referrer" onerror="imgFallback(this)">`;
  }
  return slide;
}

function buildCards() {
  const track = document.getElementById("track");
  if (!filtered.length) {
    track.innerHTML = `<div class="slide s-current"><div style="color:var(--muted);text-align:center">
      <div style="font-size:48px;margin-bottom:12px">🎲</div>
      <div style="font-size:18px;font-family:'Playfair Display',serif;color:var(--text)">No games found</div>
      <div style="margin-top:6px;font-size:13px">Try adjusting your search or filters</div>
    </div></div>`;
    document.getElementById("gcount").textContent = "0";
    document.getElementById("posLabel").textContent = "0 / 0";
    document.getElementById("prevBtn").disabled = true;
    document.getElementById("nextBtn").disabled = true;
    document.getElementById("bottomBar").innerHTML = "";
    return;
  }

  // Render only the current slide — neighbors come in on demand during navigation
  track.innerHTML = "";
  const slide = makeSlide(cur, "s-current");
  if (slide) track.appendChild(slide);

  document.getElementById("gcount").textContent = filtered.length;
  buildDots();
  updatePos();
}

// Slide transition: dir = +1 (next) or -1 (prev). 0 = no animation, just replace.
let isAnimating = false;
function transitionTo(newIdx, dir) {
  if (isAnimating) return;
  newIdx = Math.max(0, Math.min(filtered.length - 1, newIdx));
  if (newIdx === cur && dir !== 0) return;

  const track = document.getElementById("track");
  const oldSlide = track.querySelector(".slide.s-current");

  if (dir === 0 || !oldSlide) {
    // No animation — just swap
    track.innerHTML = "";
    const s = makeSlide(newIdx, "s-current");
    if (s) track.appendChild(s);
    cur = newIdx;
    updatePos();
    return;
  }

  isAnimating = true;
  // Incoming slide starts off-screen on the side it's coming from
  const incoming = makeSlide(newIdx, dir > 0 ? "s-out-right" : "s-out-left");
  if (!incoming) { isAnimating = false; return; }
  track.appendChild(incoming);

  // Force a reflow so the browser registers the starting position
  // before we add the animating class + change positions
  void incoming.offsetWidth;

  oldSlide.classList.add("s-animating");
  incoming.classList.add("s-animating");

  // Move outgoing slide off the opposite side; bring incoming to center
  oldSlide.classList.remove("s-current");
  oldSlide.classList.add(dir > 0 ? "s-out-left" : "s-out-right");
  incoming.classList.remove("s-out-right", "s-out-left");
  incoming.classList.add("s-current");

  cur = newIdx;
  updatePos();

  // Clean up after the transition
  const cleanup = () => {
    if (oldSlide && oldSlide.parentNode) oldSlide.remove();
    isAnimating = false;
  };
  oldSlide.addEventListener("transitionend", cleanup, { once: true });
  // Safety net: if transitionend doesn't fire (rare browser glitch), cleanup anyway
  setTimeout(cleanup, 600);
}

function go(dir) {
  if (!filtered.length) return;
  const newIdx = Math.max(0, Math.min(filtered.length - 1, cur + dir));
  if (newIdx === cur) return;
  transitionTo(newIdx, dir);
  updateSidebar();
}

function sidebarPick(idx) {
  jumpTo(idx);
  if (isMobileViewport()) closeSidebar();
}

function jumpTo(idx) {
  if (!filtered.length) return;
  idx = Math.max(0, Math.min(filtered.length - 1, idx));
  if (idx === cur) return;
  const dir = idx > cur ? 1 : -1;
  transitionTo(idx, dir);
  updateSidebar();
}

// Kept for compatibility — buildCards calls it after rendering.
// In the virtualized model there's nothing to lazy-load (image is set in makeSlide).
function loadCardData(_idx) { /* no-op: images set during slide creation */ }

function updatePos() {
  document.getElementById("posLabel").textContent = `${cur + 1} / ${filtered.length}`;
  document.getElementById("prevBtn").disabled = cur === 0;
  document.getElementById("nextBtn").disabled = cur >= filtered.length - 1;
  document.querySelectorAll(".pdot").forEach((d, i) => d.classList.toggle("on", i === cur));
}

// ── DOTS ──
function buildDots() {
  const bar = document.getElementById("bottomBar");
  const max = Math.min(filtered.length, 40);
  bar.innerHTML = Array.from({length: max}, (_, i) =>
    `<div class="pdot${i === cur ? " on" : ""}" id="pdot-${i}"></div>`
  ).join("");
}

// ── SIDEBAR ──
function buildSidebar() {
  const cats = ["All", ...new Set(GAMES.map(g => g.category))];
  const counts = {};
  GAMES.forEach(g => counts[g.category] = (counts[g.category]||0)+1);
  
  const dotMap = { All:"d-all", "Board Game":"d-board", "For The Youngest":"d-kids", "Puzzle":"d-puzzle", "Roleplaying Game":"d-rpg" };
  
  let html = '<div class="sec-label">Categories</div>';
  cats.forEach(cat => {
    const n = cat === "All" ? GAMES.length : (counts[cat]||0);
    const active = activeCategory === cat ? " active" : "";
    html += `<button class="filter-btn${active}" onclick="setCategory('${escAttr(cat)}')">`
          + `<span class="fdot ${dotMap[cat]||"d-all"}"></span>${escHtml(cat)}`
          + `<span class="cbadge">${n}</span></button>`;
  });
  
  html += '<div class="sec-label" style="margin-top:14px">Games</div>';
  filtered.forEach((g, i) => {
    html += `<button class="game-link${i === cur ? " cur" : ""}" onclick="sidebarPick(${i})">${escHtml(g.name)}</button>`;
  });
  
  document.getElementById("sidebarScroll").innerHTML = html;
}

function updateSidebar() {
  document.querySelectorAll(".game-link").forEach((el, i) => el.classList.toggle("cur", i === cur));
}

// ── FILTERS ──
function setCategory(cat) {
  activeCategory = cat;
  applyFilters();
}

function applyFilters() {
  filtered = GAMES.filter(g => {
    const mc = activeCategory === "All" || g.category === activeCategory;
    const ms = !searchTerm || g.name.toLowerCase().includes(searchTerm) || (g.description||"").toLowerCase().includes(searchTerm);
    return mc && ms;
  });
  cur = 0;
  buildCards();
  buildSidebar();
}

// ── MOBILE LIST OVERLAY ──
function isMobileViewport() { return window.matchMedia("(max-width: 700px)").matches; }

function openSidebar() {
  document.body.classList.add("sidebar-open");
  const btn = document.getElementById("listToggleBtn");
  if (btn) { btn.textContent = "✕ Close"; btn.setAttribute("aria-label", "Close list"); }
}
function closeSidebar() {
  document.body.classList.remove("sidebar-open");
  const btn = document.getElementById("listToggleBtn");
  if (btn) { btn.textContent = "☰ List"; btn.setAttribute("aria-label", "Show list"); }
}
function toggleSidebar() {
  if (document.body.classList.contains("sidebar-open")) closeSidebar();
  else openSidebar();
}

// If the user resizes from mobile to desktop, clear the overlay state so it doesn't
// leave the sidebar in a stuck position
window.addEventListener("resize", () => {
  if (!isMobileViewport()) document.body.classList.remove("sidebar-open");
});

// ── UTILS ──
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function escAttr(s) { return String(s||"").replace(/'/g,"\'"); }

// ── EVENTS ──
document.getElementById("searchInput").addEventListener("input", function() {
  searchTerm = this.value.toLowerCase().trim();
  applyFilters();
});
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowRight") go(1);
  if (e.key === "ArrowLeft")  go(-1);
});
let tx = 0;
document.getElementById("viewport").addEventListener("touchstart", e => tx = e.touches[0].clientX, {passive:true});
document.getElementById("viewport").addEventListener("touchend", e => {
  const dx = tx - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 50) go(dx > 0 ? 1 : -1);
}, {passive:true});

// ── INIT ──
async function init() {
  const track = document.getElementById("track");
  track.innerHTML = `<div class="slide"><div style="color:var(--muted);text-align:center">
    <div style="font-size:48px;margin-bottom:12px">⏳</div>
    <div style="font-size:18px;font-family:'Playfair Display',serif;color:var(--text)">Loading library…</div>
  </div></div>`;
  try {
    const res = await fetch("./menu_export.json", { cache: "no-cache" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    // raw is { "Game Name": { name, category, players, age, playtime, description, imageUrl }, ... }
    GAMES = Object.values(raw).map(g => ({
      name: g.name || "",
      category: normalizeCategory(g.category),
      players: g.players || null,
      age: g.age || null,
      playtime: g.playtime || null,
      description: g.description || "",
      imageUrl: g.imageUrl || null
    })).filter(g => g.name).sort((a, b) => a.name.localeCompare(b.name));
    filtered = [...GAMES];
    buildSidebar();
    buildCards();
    // On mobile, open the list overlay first so users can browse before picking
    if (isMobileViewport()) openSidebar();
  } catch (e) {
    console.error("Failed to load menu_export.json", e);
    track.innerHTML = `<div class="slide"><div style="color:var(--muted);text-align:center;max-width:480px">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <div style="font-size:18px;font-family:'Playfair Display',serif;color:var(--text)">Could not load library</div>
      <div style="margin-top:10px;font-size:13px">Make sure <code style="color:var(--accent)">menu_export.json</code> is in the same folder as this HTML file.</div>
      <div style="margin-top:6px;font-size:12px;color:#665b4a">${escHtml(e.message)}</div>
    </div></div>`;
  }
}
init();
</script>
</body>
